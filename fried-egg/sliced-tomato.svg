    <ellipse cx="30" cy="30" rx="16" ry="10" fill="#ffb3b3" opacity="0.45" />
    <g fill="#fff3" transform="translate(22,20)">
      <circle cx="6" cy="6" r="2" />
      <circle cx="14" cy="9" r="2" />
